apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:stable-trixie-perl
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html-data
              mountPath: /usr/share/nginx/html
            - name: config-data
              mountPath: /etc/nginx/
      volumes:
        - name: html-data
          persistentVolumeClaim:
            claimName: nginx-html-data
        - name: config-data
          persistentVolumeClaim:
            claimName: nginx-config-data