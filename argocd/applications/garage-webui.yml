apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: garage-webui
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/BlacksQare/k3s-test.git
    path: apps/garage-webui
    targetRevision: master
  destination:
    server: https://kubernetes.default.svc
    namespace: garage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true